<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GN1WK5BFJW"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-GN1WK5BFJW');
</script>
<title>My Piggy Banks 🐷</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:   #FF6B9D;
    --yellow: #FFD166;
    --green:  #06D6A0;
    --blue:   #118AB2;
    --purple: #7B2FBE;
    --bg:     #1a0533;
    --card:   #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #1a0533 0%, #0d1b4b 100%);
    min-height: 100vh;
    color: #1a1a2e;
    padding-bottom: 40px;
  }

  /* ── Home Button ── */
  .home-btn {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 999;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 50%;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    text-decoration: none;
    backdrop-filter: blur(6px);
    transition: background 0.2s, transform 0.15s;
  }
  .home-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.3); }

  /* ── Header ── */
  .page-header {
    text-align: center;
    padding: 28px 16px 12px;
  }
  .page-header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.4rem;
    color: var(--yellow);
    text-shadow: 0 3px 12px rgba(0,0,0,0.4);
    line-height: 1.1;
  }
  .page-header p {
    color: rgba(255,255,255,0.75);
    font-size: 1rem;
    font-weight: 700;
    margin-top: 6px;
  }

  /* ── Name Setup Screen ── */
  #setup-screen {
    max-width: 420px;
    margin: 30px auto;
    background: white;
    border-radius: 28px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.35);
  }
  #setup-screen .setup-emoji { font-size: 4rem; margin-bottom: 10px; }
  #setup-screen h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: var(--purple);
    margin-bottom: 6px;
  }
  #setup-screen p { color: #666; font-size: 0.95rem; margin-bottom: 20px; font-weight: 700; }
  .setup-input {
    width: 100%;
    border: 3px solid var(--yellow);
    border-radius: 14px;
    padding: 12px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.2rem;
    font-weight: 800;
    color: #333;
    outline: none;
    text-align: center;
    margin-bottom: 16px;
  }
  .setup-input:focus { border-color: var(--purple); }
  .start-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: white;
    border: none;
    border-radius: 18px;
    padding: 14px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(123,47,190,0.4);
    transition: transform 0.15s;
  }
  .start-btn:active { transform: scale(0.97); }

  /* ── Main Game ── */
  #game-screen { display: none; padding: 0 12px; max-width: 600px; margin: 0 auto; }

  /* ── Allowance Entry ── */
  .allowance-card {
    background: white;
    border-radius: 24px;
    padding: 20px;
    margin-bottom: 18px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.25);
    text-align: center;
  }
  .allowance-card h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--purple);
    margin-bottom: 14px;
  }
  .amount-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .dollar-sign {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--green);
  }
  .amount-input {
    width: 110px;
    border: 3px solid var(--yellow);
    border-radius: 14px;
    padding: 10px 12px;
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: #333;
    outline: none;
    text-align: center;
  }
  .amount-input:focus { border-color: var(--purple); }

  /* ── Split Selector ── */
  .split-label {
    font-weight: 900;
    font-size: 0.9rem;
    color: #888;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .split-pills {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .split-pill {
    border: 2px solid #e0e0e0;
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem;
    cursor: pointer;
    color: #888;
    background: white;
    transition: all 0.15s;
  }
  .split-pill.active {
    background: var(--purple);
    border-color: var(--purple);
    color: white;
  }
  .split-preview {
    font-size: 0.9rem;
    font-weight: 800;
    color: #555;
    margin-bottom: 14px;
    min-height: 1.2em;
  }
  .split-preview span { color: var(--purple); }

  .deposit-btn {
    background: linear-gradient(135deg, var(--green), #059669);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 13px 28px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    cursor: pointer;
    box-shadow: 0 5px 18px rgba(6,214,160,0.4);
    transition: transform 0.15s;
  }
  .deposit-btn:active { transform: scale(0.96); }

  /* ── Piggy Banks ── */
  .banks-row {
    display: flex;
    gap: 14px;
    margin-bottom: 18px;
  }
  .bank-card {
    flex: 1;
    background: white;
    border-radius: 24px;
    padding: 18px 14px;
    text-align: center;
    box-shadow: 0 6px 24px rgba(0,0,0,0.25);
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }
  .bank-card.shake { animation: bankShake 0.4s ease; }
  @keyframes bankShake {
    0%,100% { transform: translateX(0) rotate(0deg); }
    20%      { transform: translateX(-4px) rotate(-3deg); }
    40%      { transform: translateX(4px) rotate(3deg); }
    60%      { transform: translateX(-3px) rotate(-2deg); }
    80%      { transform: translateX(3px) rotate(1deg); }
  }
  .bank-emoji { font-size: 3.5rem; margin-bottom: 4px; }
  .bank-label-input {
    border: none;
    border-bottom: 2px dotted #ccc;
    width: 100%;
    min-width: 0;
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: var(--purple);
    background: transparent;
    outline: none;
    margin-bottom: 8px;
  }
  .bank-total-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    margin-bottom: 4px;
  }
  .bank-dollar {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--green);
    line-height: 1;
  }
  .bank-total {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: var(--green);
    border: none;
    border-bottom: 2px dashed rgba(6,214,160,0.4);
    background: transparent;
    text-align: center;
    width: 100%;
    min-width: 0;
    outline: none;
    cursor: text;
  }
  .bank-total:focus { border-bottom-color: var(--green); }
  .bank-total.bump { animation: totalBump 0.4s ease; }
  @keyframes totalBump {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.25); color: #059669; }
  }
  .bank-count { font-size: 0.8rem; font-weight: 800; color: #aaa; }

  /* ── Goal Bar ── */
  .goal-section { margin-top: 8px; }
  .goal-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .goal-row label { font-size: 0.75rem; font-weight: 900; color: #999; white-space: nowrap; }
  .goal-input {
    flex: 1;
    min-width: 0;
    border: none;
    border-bottom: 2px dotted #ccc;
    background: transparent;
    font-family: 'Fredoka One', cursive;
    font-size: 0.85rem;
    color: #555;
    outline: none;
    text-align: center;
  }
  .goal-bar-wrap {
    background: #f0f0f0;
    border-radius: 20px;
    height: 10px;
    overflow: hidden;
    margin-top: 4px;
  }
  .goal-bar-fill {
    height: 100%;
    border-radius: 20px;
    background: linear-gradient(90deg, var(--yellow), var(--pink));
    transition: width 0.5s ease;
  }
  .goal-pct { font-size: 0.7rem; font-weight: 900; color: #aaa; margin-top: 3px; }

  /* ── Coin Animation ── */
  .coin-fly {
    position: fixed;
    font-size: 1.6rem;
    pointer-events: none;
    z-index: 9999;
    animation: coinDrop 0.7s ease-in forwards;
  }
  @keyframes coinDrop {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    80%  { opacity: 1; transform: translateY(80px) scale(0.8); }
    100% { opacity: 0; transform: translateY(110px) scale(0.4); }
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #333;
    color: white;
    border-radius: 30px;
    padding: 12px 24px;
    font-weight: 900;
    font-size: 1rem;
    z-index: 9998;
    transition: transform 0.3s ease;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Celebration ── */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 9997;
    animation: confettiFall 1.2s ease-in forwards;
  }
  @keyframes confettiFall {
    0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  /* ── History ── */
  .history-card {
    background: white;
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.25);
    margin-bottom: 18px;
  }
  .history-card h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    color: var(--purple);
    margin-bottom: 12px;
  }
  #history-list { list-style: none; }
  #history-list li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 0.9rem;
    font-weight: 700;
  }
  #history-list li:last-child { border-bottom: none; }
  .hist-date { color: #aaa; font-size: 0.8rem; }
  .hist-amounts { color: var(--green); font-weight: 900; }
  .empty-history { color: #ccc; font-style: italic; text-align: center; padding: 12px 0; }

  /* ── Bottom Actions ── */
  .bottom-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }
  .reset-btn {
    flex: 1;
    background: white;
    color: #e74c3c;
    border: 2px solid #e74c3c;
    border-radius: 16px;
    padding: 12px;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:active { background: #ffeaea; }
  .switch-user-btn {
    flex: 1;
    background: white;
    color: var(--purple);
    border: 2px solid var(--purple);
    border-radius: 16px;
    padding: 12px;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .switch-user-btn:active { background: #f5f0ff; }

  /* ── Greeting ── */
  .greeting {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    color: var(--yellow);
    text-align: center;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<a class="home-btn" href="index.html" aria-label="Home">🏠</a>

<div class="page-header">
  <h1>🐷 My Piggy Banks</h1>
  <p>Save smart, spend smart!</p>
</div>

<!-- Setup Screen -->
<div id="setup-screen">
  <div class="setup-emoji">🐷🐷</div>
  <h2>What's your name?</h2>
  <p>We'll save your piggy bank progress just for you!</p>
  <input class="setup-input" id="name-input" type="text" placeholder="Type your name..." maxlength="20" autocomplete="off">
  <button class="start-btn" onclick="startApp()">Let's Go! 🚀</button>
</div>

<!-- Game Screen -->
<div id="game-screen">

  <div class="greeting" id="greeting"></div>

  <!-- Piggy Banks -->
  <div class="banks-row">
    <div class="bank-card" id="bank-card-0">
      <div class="bank-emoji">🐷</div>
      <input class="bank-label-input" id="bank-label-0" type="text" value="Save" maxlength="12" onchange="saveState()">
      <div class="bank-total-row"><span class="bank-dollar">$</span><input class="bank-total" id="bank-total-0" type="number" min="0" step="0.01" value="0" onblur="setTotal(0)" onkeydown="if(event.key==='Enter')this.blur()"></div>
      <div class="bank-count" id="bank-count-0">0 deposits</div>
      <div class="goal-section">
        <div class="goal-row">
          <label>🎯 Goal $</label>
          <input class="goal-input" id="bank-goal-0" type="number" min="0" step="0.50" placeholder="set a goal" onchange="saveState(); updateGoalBar(0)">
        </div>
        <div class="goal-bar-wrap"><div class="goal-bar-fill" id="goal-bar-0" style="width:0%"></div></div>
        <div class="goal-pct" id="goal-pct-0"></div>
      </div>
    </div>

    <div class="bank-card" id="bank-card-1">
      <div class="bank-emoji">🐽</div>
      <input class="bank-label-input" id="bank-label-1" type="text" value="Spend" maxlength="12" onchange="saveState()">
      <div class="bank-total-row"><span class="bank-dollar">$</span><input class="bank-total" id="bank-total-1" type="number" min="0" step="0.01" value="0" onblur="setTotal(1)" onkeydown="if(event.key==='Enter')this.blur()"></div>
      <div class="bank-count" id="bank-count-1">0 deposits</div>
      <div class="goal-section">
        <div class="goal-row">
          <label>🎯 Goal $</label>
          <input class="goal-input" id="bank-goal-1" type="number" min="0" step="0.50" placeholder="set a goal" onchange="saveState(); updateGoalBar(1)">
        </div>
        <div class="goal-bar-wrap"><div class="goal-bar-fill" id="goal-bar-1" style="width:0%"></div></div>
        <div class="goal-pct" id="goal-pct-1"></div>
      </div>
    </div>
  </div>

  <!-- Allowance Entry -->
  <div class="allowance-card">
    <h3>💰 Add Allowance</h3>
    <div class="amount-row">
      <div class="dollar-sign">$</div>
      <input class="amount-input" id="allowance-amount" type="number" min="0.25" step="0.25" placeholder="0.00">
    </div>
    <div class="split-label">How do you want to split it?</div>
    <div class="split-pills">
      <button class="split-pill active" data-split="50" onclick="setSplit(50,this)">50 / 50</button>
      <button class="split-pill" data-split="60" onclick="setSplit(60,this)">60 / 40</button>
      <button class="split-pill" data-split="70" onclick="setSplit(70,this)">70 / 30</button>
      <button class="split-pill" data-split="75" onclick="setSplit(75,this)">75 / 25</button>
    </div>
    <div class="split-preview" id="split-preview">Enter an amount above to see the split!</div>
    <button class="deposit-btn" onclick="deposit()">Drop it in! 🪙</button>
  </div>

  <!-- History -->
  <div class="history-card">
    <h3>📋 History</h3>
    <ul id="history-list"><li class="empty-history">No deposits yet — add your first allowance!</li></ul>
  </div>

  <!-- Actions -->
  <div class="bottom-actions">
    <button class="switch-user-btn" onclick="switchUser()">👤 Switch Kid</button>
    <button class="reset-btn" onclick="resetData()">🗑️ Start Over</button>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'beamlyPiggyBanks';
  let userName = '';
  let splitPct = 50;

  // State
  let state = {
    bank0Total: 0,
    bank1Total: 0,
    bank0Count: 0,
    bank1Count: 0,
    bank0Label: 'Save',
    bank1Label: 'Spend',
    bank0Goal: '',
    bank1Goal: '',
    history: []
  };

  // ── Init ──
  window.onload = () => {
    const saved = getSavedUsers();
    const lastUser = localStorage.getItem('beamlyPiggyLastUser');
    if (lastUser && saved[lastUser]) {
      loadUser(lastUser);
    }
    document.getElementById('name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') startApp();
    });
    document.getElementById('allowance-amount').addEventListener('input', updateSplitPreview);
  };

  function getSavedUsers() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
  }

  function startApp() {
    const name = document.getElementById('name-input').value.trim();
    if (!name) { showToast('Type your name first! ✏️'); return; }
    loadUser(name);
  }

  function loadUser(name) {
    userName = name;
    localStorage.setItem('beamlyPiggyLastUser', name);
    const users = getSavedUsers();
    if (users[name]) {
      state = users[name];
    } else {
      state = { bank0Total:0, bank1Total:0, bank0Count:0, bank1Count:0,
                bank0Label:'Save', bank1Label:'Spend', bank0Goal:'', bank1Goal:'', history:[] };
    }
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    renderAll();
    const hour = new Date().getHours();
    const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting').textContent = `${greet}, ${name}! 👋`;
  }

  function renderAll() {
    document.getElementById('bank-label-0').value = state.bank0Label;
    document.getElementById('bank-label-1').value = state.bank1Label;
    document.getElementById('bank-goal-0').value = state.bank0Goal;
    document.getElementById('bank-goal-1').value = state.bank1Goal;
    updateBankDisplay(0);
    updateBankDisplay(1);
    renderHistory();
    updateGoalBar(0);
    updateGoalBar(1);
  }

  function updateBankDisplay(idx) {
    const total = idx === 0 ? state.bank0Total : state.bank1Total;
    const count = idx === 0 ? state.bank0Count : state.bank1Count;
    document.getElementById(`bank-total-${idx}`).value = total.toFixed(2);
    document.getElementById(`bank-count-${idx}`).textContent =
      `${count} deposit${count !== 1 ? 's' : ''}`;
  }

  function setTotal(idx) {
    const input = document.getElementById(`bank-total-${idx}`);
    const val = Math.max(0, parseFloat(input.value) || 0);
    if (idx === 0) state.bank0Total = Math.round(val * 100) / 100;
    else           state.bank1Total = Math.round(val * 100) / 100;
    saveState();
    updateBankDisplay(idx);
    updateGoalBar(idx);
  }

  function updateGoalBar(idx) {
    const total = idx === 0 ? state.bank0Total : state.bank1Total;
    const goal  = parseFloat(idx === 0 ? state.bank0Goal : state.bank1Goal);
    const bar   = document.getElementById(`goal-bar-${idx}`);
    const pct   = document.getElementById(`goal-pct-${idx}`);
    if (!goal || isNaN(goal) || goal <= 0) {
      bar.style.width = '0%';
      pct.textContent = '';
      return;
    }
    const p = Math.min(100, (total / goal) * 100);
    bar.style.width = p.toFixed(1) + '%';
    if (p >= 100) {
      pct.textContent = '🎉 Goal reached!';
    } else {
      pct.textContent = `${p.toFixed(0)}% — $${(goal - total).toFixed(2)} to go`;
    }
  }

  // ── Split ──
  function setSplit(pct, el) {
    splitPct = pct;
    document.querySelectorAll('.split-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    updateSplitPreview();
  }

  function updateSplitPreview() {
    const amt = parseFloat(document.getElementById('allowance-amount').value);
    const preview = document.getElementById('split-preview');
    const l0 = document.getElementById('bank-label-0').value || 'Save';
    const l1 = document.getElementById('bank-label-1').value || 'Spend';
    if (!amt || isNaN(amt) || amt <= 0) {
      preview.innerHTML = 'Enter an amount above to see the split!';
      return;
    }
    const a0 = (amt * splitPct / 100).toFixed(2);
    const a1 = (amt * (100 - splitPct) / 100).toFixed(2);
    preview.innerHTML = `<span>${l0}: $${a0}</span> &nbsp;·&nbsp; <span>${l1}: $${a1}</span>`;
  }

  // ── Deposit ──
  function deposit() {
    const amt = parseFloat(document.getElementById('allowance-amount').value);
    if (!amt || isNaN(amt) || amt <= 0) {
      showToast('Enter an allowance amount first! 💰');
      return;
    }
    const a0 = Math.round(amt * splitPct) / 100;
    const a1 = Math.round(amt * (100 - splitPct)) / 100;

    state.bank0Total  = Math.round((state.bank0Total + a0) * 100) / 100;
    state.bank1Total  = Math.round((state.bank1Total + a1) * 100) / 100;
    state.bank0Count++;
    state.bank1Count++;

    const date = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric' });
    state.history.unshift({
      date,
      total: amt.toFixed(2),
      a0: a0.toFixed(2),
      a1: a1.toFixed(2),
      l0: state.bank0Label,
      l1: state.bank1Label
    });
    if (state.history.length > 20) state.history.pop();

    saveState();
    updateBankDisplay(0);
    updateBankDisplay(1);
    renderHistory();
    updateGoalBar(0);
    updateGoalBar(1);
    animateBump(0);
    animateBump(1);
    flyCoins(0, a0);
    flyCoins(1, a1);
    document.getElementById('allowance-amount').value = '';
    document.getElementById('split-preview').innerHTML = 'Enter an amount above to see the split!';

    // Check goals
    const goal0 = parseFloat(state.bank0Goal);
    const goal1 = parseFloat(state.bank1Goal);
    if (goal0 > 0 && state.bank0Total >= goal0) { setTimeout(() => { celebrate(); showToast(`🎉 ${state.bank0Label} goal reached!`); }, 500); }
    else if (goal1 > 0 && state.bank1Total >= goal1) { setTimeout(() => { celebrate(); showToast(`🎉 ${state.bank1Label} goal reached!`); }, 500); }
    else { showToast(`$${a0} + $${a1} — nice saving! 🌟`); }
  }

  function animateBump(idx) {
    const el = document.getElementById(`bank-total-${idx}`);
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
    el.addEventListener('animationend', () => el.classList.remove('bump'), { once: true });
    const card = document.getElementById(`bank-card-${idx}`);
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
    card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
  }

  function flyCoins(idx, amount) {
    const card = document.getElementById(`bank-card-${idx}`);
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + 40;
    const count = Math.min(5, Math.max(1, Math.ceil(amount)));
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const coin = document.createElement('div');
        coin.className = 'coin-fly';
        coin.textContent = '🪙';
        coin.style.left = (cx - 12 + (Math.random() - 0.5) * 40) + 'px';
        coin.style.top  = (cy - 20) + 'px';
        document.body.appendChild(coin);
        coin.addEventListener('animationend', () => coin.remove());
      }, i * 100);
    }
  }

  function celebrate() {
    const colors = ['#FF6B9D','#FFD166','#06D6A0','#118AB2','#7B2FBE','#FF8C42'];
    for (let i = 0; i < 30; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.top  = '-20px';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.transform = `rotate(${Math.random()*360}deg)`;
        document.body.appendChild(c);
        c.addEventListener('animationend', () => c.remove());
      }, i * 40);
    }
  }

  // ── History ──
  function renderHistory() {
    const list = document.getElementById('history-list');
    if (!state.history.length) {
      list.innerHTML = '<li class="empty-history">No deposits yet — add your first allowance!</li>';
      return;
    }
    list.innerHTML = state.history.map(h => `
      <li>
        <div>
          <div style="font-weight:900;color:#333;">$${h.total} split ${splitPct}/${100-splitPct}</div>
          <div class="hist-date">${h.date}</div>
        </div>
        <div class="hist-amounts">${h.l0}: $${h.a0} · ${h.l1}: $${h.a1}</div>
      </li>
    `).join('');
  }

  // ── Persist ──
  function saveState() {
    state.bank0Label = document.getElementById('bank-label-0').value || 'Save';
    state.bank1Label = document.getElementById('bank-label-1').value || 'Spend';
    state.bank0Goal  = document.getElementById('bank-goal-0').value;
    state.bank1Goal  = document.getElementById('bank-goal-1').value;
    const users = getSavedUsers();
    users[userName] = state;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
  }

  function resetData() {
    if (!confirm(`Start ${userName}'s banks over from $0.00? This can't be undone! 🐷`)) return;
    state = { bank0Total:0, bank1Total:0, bank0Count:0, bank1Count:0,
              bank0Label: state.bank0Label, bank1Label: state.bank1Label,
              bank0Goal: state.bank0Goal, bank1Goal: state.bank1Goal, history:[] };
    saveState();
    renderAll();
    showToast('Banks reset to zero! Fresh start 🌟');
  }

  function switchUser() {
    saveState();
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('setup-screen').style.display = 'block';
    document.getElementById('name-input').value = '';
    userName = '';
  }

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
